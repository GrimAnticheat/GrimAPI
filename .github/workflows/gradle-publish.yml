name: Gradle Publish

# Snapshot build — runs on every push to master. Version stays
# <base>-<commit> per VersionUtil, intended for downstream consumers
# that want the bleeding edge between tagged releases.
#
# For clean-version release builds, run the Release workflow manually.

on:
  push:
    branches:
      - master

jobs:
  publish:
    uses: ./.github/workflows/build-and-publish.yml
    with:
      release: false
    secrets: inherit
